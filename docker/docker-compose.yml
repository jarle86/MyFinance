version: '3.8'

services:
  # PostgreSQL with pgvector for future RAG support
  postgres:
    image: pgvector/pgvector:pg16
    container_name: myfinance_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-myfinance}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-myfinance}
      POSTGRES_DB: ${DB_NAME:-myfinance}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-myfinance}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ollama LLM Proxy (optional - only if running locally)
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: myfinance_ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   environment:
  #     OLLAMA_HOST: 0.0.0.0:11434

volumes:
  postgres_data:
  # ollama_data:

networks:
  default:
    name: myfinance_network
